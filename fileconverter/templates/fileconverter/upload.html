{% extends 'base.html' %} {% block content %}

<style>
  @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap");

  :root {
    --ink: #1a1a2e;
    --gold: #c9a84c;
    --cream: #faf7f0;
    --muted: #8a8a9a;
    --card-bg: #ffffff;
    --border: #e8e4db;
  }

  body {
    background: var(--cream);
    font-family: "DM Sans", sans-serif;
  }

  .page-wrapper {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1rem;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 3rem;
    width: 100%;
    max-width: 560px;
    box-shadow: 0 2px 40px rgba(0, 0, 0, 0.06);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), #e8c96e, var(--gold));
  }

  .card-label {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .card-title {
    font-family: "Playfair Display", serif;
    font-size: 1.9rem;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 0.4rem;
  }

  .card-desc {
    color: var(--muted);
    font-size: 0.88rem;
    line-height: 1.6;
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
  }

  .card p {
    margin-bottom: 1.2rem;
  }

  .card label {
    display: block;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--ink);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .card input[type="text"],
  .card input[type="email"],
  .card input[type="file"],
  .card select,
  .card textarea {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: "DM Sans", sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    background: var(--cream);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    box-sizing: border-box;
  }

  .card input:focus,
  .card select:focus,
  .card textarea:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.12);
  }

  .submit-btn {
    width: 100%;
    padding: 0.9rem;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 2px;
    font-family: "DM Sans", sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: background 0.2s, transform 0.1s;
  }

  .submit-btn:hover {
    background: #2d2d4e;
  }
  .submit-btn:active {
    transform: scale(0.99);
  }

  /* ── LOADING STATE ── */
  .submit-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .status-msg {
    margin-top: 1rem;
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
    min-height: 1.2em;
  }

  .status-msg.success {
    color: #2e7d32;
    font-weight: 500;
  }

  .status-msg.error {
    color: #c0392b;
    background: #fef2f2;
    border: 1px solid #f5c6cb;
    border-radius: 4px;
    padding: 10px 14px;
    white-space: pre-line;
    text-align: left;
    line-height: 1.6;
  }
</style>

<!-- Page -->
<div class="page-wrapper">
  <div class="card">
    <div class="card-label">Баримт бичиг</div>
    <h1 class="card-title">Нэрийн жагсаалтийг<br />хувийн хэрэг болгох</h1>
    <p class="card-desc">Файлаа оруулж, автоматаар хувийн хэрэг болгоно уу.</p>

    <form enctype="multipart/form-data" id="convertForm">
      {% csrf_token %} {{ form.as_p }}
      <button type="submit" class="submit-btn" id="submitBtn">Хөрвүүлэх →</button>
    </form>

    <div class="status-msg" id="statusMsg"></div>
  </div>
</div>

<script>
  const form = document.getElementById("convertForm");
  const btn = document.getElementById("submitBtn");
  const msg = document.getElementById("statusMsg");

  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const fileInput = form.querySelector('input[type="file"]');
    if (!fileInput || !fileInput.files.length) {
      showMsg("Файл сонгоно уу.", "error");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Боловсруулж байна...";
    showMsg("", "");

    const formData = new FormData(form);

    try {
      const res = await fetch("", {
        method: "POST",
        body: formData,
      });

      if (res.ok) {
        // Success — trigger file download
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "Huviin_hereg.docx";
        a.click();
        URL.revokeObjectURL(url);
        showMsg("✓ Амжилттай татагдлаа!", "success");
      } else {
        const data = await res.json().catch(() => ({ error: "Серверийн алдаа" }));
        showMsg(data.error || "Алдаа гарлаа.", "error");
      }
    } catch (err) {
      showMsg("Холболтын алдаа: " + err.message, "error");
    } finally {
      btn.disabled = false;
      btn.textContent = "Хөрвүүлэх →";
    }
  });

  function showMsg(text, type) {
    msg.textContent = text;
    msg.className = "status-msg" + (type ? " " + type : "");
  }
</script>

{% endblock %}
